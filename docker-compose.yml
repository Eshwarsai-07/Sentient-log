version: "3.8"

services:
  sentient-clickhouse:
    image: clickhouse/clickhouse-server:24.12
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: sentient_log
      CLICKHOUSE_USER: sentient
      CLICKHOUSE_PASSWORD: strongpassword123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - sentient-log_ch_data:/var/lib/clickhouse
      - sentient-log_ch_logs:/var/log/clickhouse-server
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - sentient-network

  sentient-mongodb:
    image: mongo:7
    container_name: sentient-mongodb
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: sentient
      MONGO_INITDB_ROOT_PASSWORD: sentientpassword
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - sentient-network

  sentient-api:
    build: .
    ports:
      - "3100:3100"
    environment:
      - CLICKHOUSE_URL=sentient-clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=sentient
      - CLICKHOUSE_PASSWORD=strongpassword123
      - CLICKHOUSE_DATABASE=sentient_log
      - OPENAI_API_KEY=${OPENAI_API_KEY:-""}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-"https://api.groq.com/openai/v1"}
      - OPENAI_MODEL=${OPENAI_MODEL:-"llama-3.3-70b-versatile"}
      - MONGODB_URI=mongodb://sentient:sentientpassword@sentient-mongodb:27017/?authSource=admin
      - MONGODB_DB_NAME=sentient_auth
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-"your_super_secret_jwt_key_here"}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-"HS256"}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    depends_on:
      sentient-clickhouse:
        condition: service_healthy
      sentient-mongodb:
        condition: service_started
    restart: always
    networks:
      - sentient-network

volumes:
  sentient-log_ch_data:
  sentient-log_ch_logs:
  mongodb_data:

networks:
  sentient-network:
    driver: bridge
